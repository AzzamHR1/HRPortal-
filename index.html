<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APC — HR Portal</title>
<link rel="icon" href="data:image/svg+xml,<svg viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'><rect width='40' height='40' rx='8' fill='%231E3A5F'/><circle cx='20' cy='20' r='8' stroke='white' stroke-width='2.5' fill='none'/><circle cx='20' cy='20' r='3' fill='%2360A5FA'/></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Tajawal',system-ui,sans-serif;min-height:100vh;transition:background .3s,color .3s}
:root{
  --bg:#F0F4F8;--bg2:#FFF;--bg3:#E8EEF4;--bgi:#F0F4F8;--fg:#0F172A;--fg2:#475569;--fg3:#94A3B8;--bd:#CBD5E1;
  --ac:#1E3A5F;--acl:#DBEAFE;--ok:#059669;--okl:#D1FAE5;--wn:#D97706;--wnl:#FEF3C7;--er:#DC2626;--erl:#FEE2E2;
}
body.dark{
  --bg:#0B1120;--bg2:#131B2E;--bg3:#1A2540;--bgi:#162035;--fg:#F1F5F9;--fg2:#94A3B8;--fg3:#475569;--bd:#1E3050;
  --ac:#3B82F6;--acl:#0F2440;--ok:#34D399;--okl:#064E3B;--wn:#FBBF24;--wnl:#713F12;--er:#F87171;--erl:#7F1D1D;
}
body{background:var(--bg);color:var(--fg)}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.login-box{width:100%;max-width:360px;background:var(--bg2);border:1px solid var(--bd);border-radius:20px;padding:28px}
.login-logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#1E3A5F,#2563EB);display:inline-flex;align-items:center;justify-content:center;margin-bottom:8px}
.login-title{font-size:16px;font-weight:800;letter-spacing:3px}
.login-sub{font-size:9px;color:var(--fg3)}
.login-input{padding:9px 12px;border-radius:10px;border:1px solid var(--bd);background:var(--bgi);color:var(--fg);font-size:12px;outline:none;width:100%}
.login-btn{padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--ac),#2563EB);color:#fff;font-size:13px;font-weight:700;width:100%;cursor:pointer}
.layout{display:flex;min-height:100vh}
.sidebar{width:180px;flex-shrink:0;border-left:1px solid var(--bd);background:var(--bg2);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;transition:width .25s;overflow:hidden}
.sidebar.collapsed{width:50px}
.sb-logo{padding:12px;display:flex;align-items:center;gap:6px}
.sidebar.collapsed .sb-logo{padding:8px;justify-content:center}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#1E3A5F,#2563EB);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sidebar.collapsed .logo-icon{width:28px;height:28px}
.logo-text{display:block}
.sidebar.collapsed .logo-text{display:none}
.logo-name{font-size:13px;font-weight:800;letter-spacing:2px;font-family:monospace}
.logo-desc{font-size:7px;color:var(--fg3)}
nav{flex:1;padding:4px 6px}
.nav-btn{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;font-size:11px;font-weight:400;background:transparent;color:var(--fg2);border:none;width:100%;margin-bottom:2px;transition:all .15s}
.sidebar.collapsed .nav-btn{justify-content:center;padding:8px 0}
.nav-btn.active{font-weight:700;background:var(--acl);color:var(--ac)}
.nav-btn .nav-label{display:inline}
.sidebar.collapsed .nav-btn .nav-label{display:none}
.nav-btn .nav-icon{font-size:14px}
.sb-profile{padding:8px;border-top:1px solid var(--bd)}
.sidebar.collapsed .sb-profile{display:none}
.profile-box{display:flex;align-items:center;gap:6px;padding:6px;border-radius:8px;background:var(--bg3)}
.main-area{flex:1;display:flex;flex-direction:column}
header{height:44px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:sticky;top:0;z-index:40;background:var(--bg2)}
.hdr-btn{background:var(--bg3);border:none;padding:4px 6px;border-radius:6px;font-size:12px;position:relative}
.notif-dot{position:absolute;top:1px;right:1px;width:6px;height:6px;border-radius:50%;background:var(--er)}
main{flex:1;padding:16px;overflow-y:auto}
.avatar{display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;flex-shrink:0;border-radius:7px}
.avatar.big{width:34px;height:34px;border-radius:10px;font-size:11px}
.avatar.small{width:22px;height:22px;font-size:8px}
.badge{padding:1px 6px;border-radius:5px;font-size:8px;font-weight:600;display:inline-block}
.checkbox{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;border:2px solid var(--bd);background:transparent}
.checkbox.checked{border:none;background:var(--ok)}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:14px}
.stat-card{background:var(--bg2);border:1px solid var(--bd);border-radius:12px;padding:12px}
.modal-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.4)}
.modal-box{position:relative;background:var(--bg2);border:1px solid var(--bd);border-radius:16px;padding:20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.input{padding:6px 8px;border-radius:7px;border:1px solid var(--bd);background:var(--bgi);color:var(--fg);font-size:11px;outline:none;width:100%}
.input-lg{padding:8px 10px;border-radius:8px;font-size:12px}
.btn-primary{padding:6px 14px;border-radius:8px;border:none;background:var(--ac);color:#fff;font-size:11px;font-weight:600}
.btn-secondary{padding:6px 14px;border-radius:8px;border:1px solid var(--bd);background:var(--bg2);color:var(--fg2);font-size:11px}
.grid-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
.grid-2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.grid-kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.mini-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:6px}
.kanban-col{background:var(--bg3);border-radius:12px;padding:8px;min-height:140px}
.kanban-card{background:var(--bg2);border:1px solid var(--bd);border-radius:10px;padding:10px;margin-bottom:6px;cursor:pointer}
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start}
.progress-bar{height:5px;border-radius:3px;background:var(--bg3);overflow:hidden}
.progress-fill{height:100%;border-radius:3px}
.letter-preview{background:#fff;margin:12px;border-radius:8px;padding:20px;color:#111;font-size:10px;line-height:1.7;font-family:Arial,sans-serif}
.hidden{display:none!important}
.page{display:none}
.page.active{display:block}
.color-btn{width:28px;height:28px;border-radius:8px;border:2px solid transparent;cursor:pointer}
.color-btn.active{border:3px solid var(--fg)}
.status-dot{width:10px;height:10px;border-radius:3px;display:inline-block}
.tab-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;border-radius:10px;border:1px solid var(--bd);background:var(--bg2);cursor:pointer}
.tab-btn.active{border:2px solid var(--ac);background:var(--acl)}
.view-btn{padding:5px 8px;border-radius:6px;border:1px solid var(--bd);background:var(--bgi);color:var(--fg3);font-size:10px}
.view-btn.active{background:var(--ac);color:#fff}
.done-toggle{padding:5px 12px;border-radius:12px;border:none;font-size:10px;font-weight:600}
table.data-table{width:100%;border-collapse:collapse;font-size:10px}
table.data-table th{text-align:right;padding:7px 8px;color:var(--fg3);font-size:9px;border-bottom:2px solid var(--bd)}
table.data-table td{padding:7px 8px;border-bottom:1px solid var(--bd)}
@media(max-width:768px){
  .sidebar{position:fixed;z-index:50;right:0;top:0}
  .sidebar.collapsed{width:0;border:none}
  .tpl-grid{grid-template-columns:1fr}
  .grid-kanban{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .grid-kanban{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="login-wrap">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:24px">
      <div class="login-logo">
        <svg viewBox="0 0 40 40" width="26" height="26" fill="none"><circle cx="20" cy="20" r="8" stroke="#fff" stroke-width="2.5"/><path d="M12 20h-6M28 20h6M20 12v-6M20 28v6" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/><circle cx="20" cy="20" r="3" fill="#60A5FA"/></svg>
      </div>
      <div class="login-title">APC</div>
      <div class="login-sub">HR PORTAL — الشركة العربية للأنابيب</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <input class="login-input" value="sarah@apc.com" id="emailInput">
      <input class="login-input" type="password" value="12345678" id="passInput">
      <button class="login-btn" onclick="doLogin()">تسجيل الدخول</button>
    </div>
    <p style="text-align:center;font-size:9px;color:var(--fg3);margin-top:16px">🔒 وصول مقيد — فريق HR فقط</p>
  </div>
</div>

<!-- MAIN APP -->
<div id="appScreen" class="layout hidden">
  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sb-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 40 40" width="18" height="18" fill="none"><circle cx="20" cy="20" r="8" stroke="#fff" stroke-width="2.5"/><path d="M12 20h-6M28 20h6M20 12v-6M20 28v6" stroke="#60A5FA" stroke-width="1.5" stroke-linecap="round"/><circle cx="20" cy="20" r="3" fill="#60A5FA"/></svg>
      </div>
      <div class="logo-text">
        <div class="logo-name">APC</div>
        <div class="logo-desc">HR PORTAL</div>
      </div>
    </div>
    <nav id="navMenu"></nav>
    <div class="sb-profile">
      <div class="profile-box">
        <div class="avatar big" style="background:#7C3AED">SA</div>
        <div>
          <p style="font-size:10px;font-weight:700">Sarah</p>
          <p style="font-size:7px;color:var(--fg3)">HR Manager</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- CONTENT -->
  <div class="main-area">
    <header>
      <div style="display:flex;align-items:center;gap:6px">
        <button class="hdr-btn" onclick="toggleSidebar()">☰</button>
        <span id="pageTitle" style="font-size:12px;font-weight:700"></span>
      </div>
      <div style="display:flex;gap:4px">
        <button class="hdr-btn" onclick="toggleDark()" id="darkBtn">🌙</button>
        <button class="hdr-btn" onclick="toggleNotif()" id="notifBtn">🔔<span class="notif-dot" id="notifDot"></span></button>
      </div>
    </header>
    <main>
      <div id="page-dash" class="page"></div>
      <div id="page-tasks" class="page"></div>
      <div id="page-tpl" class="page"></div>
      <div id="page-ana" class="page"></div>
      <div id="page-set" class="page"></div>
    </main>
  </div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay hidden" onclick="closeModal()">
  <div class="modal-bg"></div>
  <div class="modal-box" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;margin-bottom:14px">
      <h3 id="modalTitle" style="font-size:14px;font-weight:700"></h3>
      <button class="hdr-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ========== DATA ==========
const MEMBERS=[
  {id:"m1",n:"Sarah Ahmed",a:"SA",c:"#7C3AED"},
  {id:"m2",n:"Omar Hassan",a:"OH",c:"#2563EB"},
  {id:"m3",n:"Layla Khalil",a:"LK",c:"#DB2777"},
  {id:"m4",n:"Yusuf Ali",a:"YA",c:"#059669"}
];
const PRIORITIES=[
  {id:"low",l:"منخفض",c:"#6B7280"},
  {id:"medium",l:"متوسط",c:"#2563EB"},
  {id:"high",l:"عالي",c:"#F59E0B"},
  {id:"urgent",l:"عاجل",c:"#EF4444"}
];
let STATUSES=[
  {id:"todo",l:"انتظار",c:"#6B7280"},
  {id:"progress",l:"تنفيذ",c:"#2563EB"},
  {id:"review",l:"مراجعة",c:"#F59E0B"},
  {id:"done",l:"مكتمل",c:"#10B981"}
];
const uid=()=>Math.random().toString(36).slice(2,9);
const td=new Date().toISOString().split("T")[0];

let tasks=[
  {id:uid(),t:"مراجعة سياسة العمل عن بعد",s:"progress",p:"high",as:"m1",tg:["سياسات"],d:"2026-03-25",cm:[{id:uid(),au:"m2",tx:"تم إعداد المسودة",tm:"منذ ساعتين"}],at:[{id:uid(),n:"سياسة.pdf",sz:"2.4MB"}],dn:false},
  {id:uid(),t:"إعداد تقرير Q1",s:"todo",p:"urgent",as:"m2",tg:["تقارير"],d:"2026-03-30",cm:[],at:[],dn:false},
  {id:uid(),t:"تحديث دليل الموظف",s:"review",p:"medium",as:"m3",tg:["سياسات"],d:"2026-04-01",cm:[],at:[],dn:false},
  {id:uid(),t:"جدولة مقابلات التوظيف",s:"done",p:"low",as:"m4",tg:["توظيف"],d:"2026-03-20",cm:[],at:[],dn:true,dAt:"2026-03-19"},
  {id:uid(),t:"خطة التدريب السنوية",s:"todo",p:"high",as:"m1",tg:["تدريب"],d:"2026-04-15",cm:[],at:[],dn:false},
  {id:uid(),t:"مراجعة عقود الموظفين",s:"progress",p:"medium",as:"m3",tg:["عقود"],d:"2026-03-28",cm:[],at:[{id:uid(),n:"عقد.docx",sz:"890KB"}],dn:false}
];

const NAV=[
  {id:"dash",l:"لوحة التحكم",e:"🏠"},
  {id:"tasks",l:"المهام",e:"✅"},
  {id:"tpl",l:"الخطابات",e:"📄"},
  {id:"ana",l:"التقارير",e:"📊"},
  {id:"set",l:"الإعدادات",e:"⚙️"}
];

let currentPage="dash";
let sidebarOpen=true;
let darkMode=false;
let taskView="kanban";
let showDone=false;
let taskSearch="";
let tplTab="salary";
let tplGen=null;
let empData={nm:"",ne:"",eid:"",ti:"",te:"",dp:"",de:"",jd:"",nat:"",idn:"",ed:"",dur:"",rsn:"",ld:"",bs:"",hs:"",tr:"",ot:"",tt:""};
let dragTaskId=null;

// ========== HELPERS ==========
function getMember(id){return MEMBERS.find(m=>m.id===id)}
function getPriority(id){return PRIORITIES.find(p=>p.id===id)}
function getStatus(id){return STATUSES.find(s=>s.id===id)}

function avatarHTML(memberId,big){
  const m=getMember(memberId);
  const sz=big?'big':'small';
  return `<div class="avatar ${sz}" style="background:${m?.c||'#888'}">${m?.a||'?'}</div>`;
}

function badgeHTML(label,color){
  return `<span class="badge" style="background:${(color||'#888')}18;color:${color}">${label}</span>`;
}

function donutSVG(val,tot,color,size){
  size=size||60;
  const p=tot>0?(val/tot)*100:0;
  const r=(size-8)/2;
  const ci=2*Math.PI*r;
  const off=ci-(ci*p/100);
  return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="currentColor" stroke-width="5" opacity=".15"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="5" stroke-dasharray="${ci}" stroke-dashoffset="${off}" stroke-linecap="round"/>
    <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="central" fill="currentColor" font-size="11" font-weight="700" style="transform:rotate(90deg);transform-origin:center">${Math.round(p)}%</text>
  </svg>`;
}

// ========== LOGIN ==========
function doLogin(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('appScreen').classList.remove('hidden');
  buildNav();
  navigate('dash');
}

// ========== NAV ==========
function buildNav(){
  const nav=document.getElementById('navMenu');
  nav.innerHTML=NAV.map(n=>`<button class="nav-btn ${currentPage===n.id?'active':''}" onclick="navigate('${n.id}')"><span class="nav-icon">${n.e}</span><span class="nav-label">${n.l}</span></button>`).join('');
}

function navigate(pg){
  currentPage=pg;
  buildNav();
  document.getElementById('pageTitle').textContent=NAV.find(n=>n.id===pg)?.l||'';
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+pg).classList.add('active');
  renderPage(pg);
}

function toggleSidebar(){
  sidebarOpen=!sidebarOpen;
  document.getElementById('sidebar').classList.toggle('collapsed',!sidebarOpen);
}

function toggleDark(){
  darkMode=!darkMode;
  document.body.classList.toggle('dark',darkMode);
  document.getElementById('darkBtn').textContent=darkMode?'☀️':'🌙';
}

function toggleNotif(){}

// ========== MODAL ==========
function openModal(title,html){
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalContent').innerHTML=html;
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){
  document.getElementById('modal').classList.add('hidden');
}

// ========== RENDER PAGES ==========
function renderPage(pg){
  if(pg==='dash') renderDash();
  else if(pg==='tasks') renderTasks();
  else if(pg==='tpl') renderTpl();
  else if(pg==='ana') renderAna();
  else if(pg==='set') renderSet();
}

// ---- DASHBOARD ----
function renderDash(){
  const dn=tasks.filter(t=>t.dn).length;
  const ov=tasks.filter(t=>new Date(t.d)<new Date()&&!t.dn).length;
  const active=tasks.filter(t=>!t.dn);
  const el=document.getElementById('page-dash');
  el.innerHTML=`
    <div style="display:flex;flex-direction:column;gap:16px">
      <div><h1 style="font-size:20px;font-weight:800">مرحبًا، Sarah 👋</h1>
        <p style="font-size:11px;color:var(--fg3);margin-top:4px">${active.length} نشطة${ov>0?` <span style="color:var(--er)"> · ${ov} متأخرة</span>`:''}</p></div>
      <div class="grid-stats">
        ${[{l:"إجمالي",v:tasks.length,co:'var(--ac)',e:"📋"},{l:"مكتملة",v:dn,co:'var(--ok)',e:"✅"},{l:"متأخرة",v:ov,co:'var(--er)',e:"⏰"}].map(s=>`
        <div class="stat-card">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:16px">${s.e}</span><span style="font-size:18px;font-weight:800;color:${s.co}">${s.v}</span></div>
          <span style="font-size:9px;color:var(--fg3)">${s.l}</span>
        </div>`).join('')}
      </div>
      <div class="grid-2">
        <div class="card">
          <h3 style="font-size:11px;font-weight:700;margin-bottom:10px">📊 الحالة</h3>
          <div style="display:flex;justify-content:center;margin-bottom:8px">${donutSVG(dn,tasks.length,'var(--ok)',80)}</div>
          ${STATUSES.map(s=>`<div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px"><div style="display:flex;align-items:center;gap:4px"><div style="width:7px;height:7px;border-radius:2px;background:${s.c}"></div><span style="color:var(--fg2)">${s.l}</span></div><b>${tasks.filter(t=>t.s===s.id).length}</b></div>`).join('')}
        </div>
        <div class="card">
          <h3 style="font-size:11px;font-weight:700;margin-bottom:10px">📌 القادمة</h3>
          ${active.slice(0,4).map(t=>{const p=getPriority(t.p);const mb=getMember(t.as);return `
          <div onclick="navigate('tasks')" style="display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:8px;cursor:pointer;border-right:3px solid ${p?.c};margin-bottom:4px">
            <div style="flex:1"><p style="font-size:10px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.t}</p><span style="font-size:8px;color:var(--fg3)">${t.d}</span></div>
            ${avatarHTML(t.as)}
          </div>`}).join('')}
        </div>
      </div>
    </div>`;
}

// ---- TASKS ----
function renderTasks(){
  const ac=tasks.filter(t=>!t.dn);
  const cp=tasks.filter(t=>t.dn);
  const fl=ac.filter(t=>t.t.includes(taskSearch));
  const el=document.getElementById('page-tasks');

  let html=`<div style="display:flex;flex-direction:column;gap:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <h1 style="font-size:20px;font-weight:800">إدارة المهام</h1>
      <button class="btn-primary" style="padding:7px 14px" onclick="openAddTask()">➕ مهمة جديدة</button>
    </div>
    <div class="mini-stats">

        <button class="btn-secondary" style="padding:2px 8px;font-size:8px" onclick="undoTask('${t.id}')">↩</button>

  // Kanban
  if(taskView==='kanban'){
    html+=`<div class="grid-kanban">${STATUSES.map(s=>`
      <div class="kanban-col" ondragover="event.preventDefault()" ondrop="dropTask('${s.id}')">
        <div style="display:flex;align-items:center;gap:4px;margin-bottom:8px">
          <div style="width:7px;height:7px;border-radius:2px;background:${s.c}"></div>
          <span style="font-size:10px;font-weight:700">${s.l}</span>
          <span style="margin-inline-start:auto;font-size:8px;padding:1px 5px;border-radius:4px;background:var(--bg2);color:var(--fg3)">${fl.filter(t=>t.s===s.id).length}</span>

          </div>
        </div>`}).join('')}
      </div>`).join('')}</div>`;
  }

  // List view
  if(taskView==='list'){
    html+=`<div class="card" style="overflow-x:auto"><table class="data-table"><thead><tr>
      ${["","المهمة","الحالة","الأولوية","المسؤول","التاريخ"].map(h=>`<th>${h}</th>`).join('')}
    </tr></thead><tbody>

        <td style="color:var(--fg3)">${t.d}</td>
      </tr>`}).join('')}
    </tbody></table></div>`;
  }

  html+=`</div>`;
  el.innerHTML=html;
}

function completeTask(id){
  tasks=tasks.map(t=>t.id===id?{...t,dn:true,dAt:td,s:"done"}:t);
  renderTasks();
}
function undoTask(id){
  tasks=tasks.map(t=>t.id===id?{...t,dn:false,dAt:null,s:"todo"}:t);
  renderTasks();
}
function dropTask(statusId){
  if(dragTaskId){
    tasks=tasks.map(t=>t.id===dragTaskId?{...t,s:statusId}:t);
    dragTaskId=null;
    renderTasks();
  }
}

function taskFormHTML(ini){
  const t=ini||{t:"",s:"todo",p:"medium",as:"m1",tg:[],d:td,at:[]};
  return `<div style="display:flex;flex-direction:column;gap:10px">
    <input id="tf_title" value="${t.t}" placeholder="عنوان المهمة *" class="input input-lg">
    <div style="display:flex;gap:6px">
      <select id="tf_status" class="input" style="flex:1">${STATUSES.map(s=>`<option value="${s.id}" ${t.s===s.id?'selected':''}>${s.l}</option>`).join('')}</select>
      <select id="tf_priority" class="input" style="flex:1">${PRIORITIES.map(p=>`<option value="${p.id}" ${t.p===p.id?'selected':''}>${p.l}</option>`).join('')}</select>
    </div>
    <div style="display:flex;gap:6px">
      <select id="tf_assign" class="input" style="flex:1">${MEMBERS.map(m=>`<option value="${m.id}" ${t.as===m.id?'selected':''}>${m.n}</option>`).join('')}</select>
      <input id="tf_date" type="date" value="${t.d}" class="input" style="flex:1">
    </div>
    ${(t.at||[]).map(a=>`<div style="display:flex;align-items:center;gap:4px;padding:3px 6px;border-radius:6px;background:var(--bg3);font-size:9px"><span>📎 ${a.n}</span></div>`).join('')}
  </div>`;
}

function openAddTask(){
  openModal('مهمة جديدة',taskFormHTML()+`
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:12px">
      <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
      <button class="btn-primary" onclick="saveNewTask()">حفظ</button>
    </div>`);
}

function saveNewTask(){
  const t=document.getElementById('tf_title').value;
  if(!t)return;
  tasks.push({id:uid(),t,s:document.getElementById('tf_status').value,p:document.getElementById('tf_priority').value,as:document.getElementById('tf_assign').value,d:document.getElementById('tf_date').value,tg:[],cm:[],at:[],dn:false});
  closeModal();
  renderTasks();
}

function openEditTask(id){
  const t=tasks.find(x=>x.id===id);
  if(!t)return;
  const mb=getMember(t.as);
  let html=taskFormHTML(t)+`
    <div style="display:flex;gap:6px;justify-content:flex-end;margin-top:12px">
      <button class="btn-secondary" onclick="closeModal()">إلغاء</button>
      <button class="btn-primary" onclick="saveEditTask('${id}')">حفظ</button>
    </div>
    <div style="border-top:1px solid var(--bd);margin-top:12px;padding-top:10px">
      <h4 style="font-size:11px;font-weight:700;margin-bottom:6px">💬 التعليقات (${t.cm?.length||0})</h4>
      ${(t.cm||[]).map(x=>{const m2=getMember(x.au);return `<div style="display:flex;gap:4px;margin-bottom:4px">${avatarHTML(x.au)}<div style="flex:1;background:var(--bg3);border-radius:8px;padding:6px"><b style="font-size:9px">${m2?.n}</b><p style="font-size:9px;color:var(--fg2);margin:2px 0 0">${x.tx}</p></div></div>`}).join('')}
      <div style="display:flex;gap:4px">
        <input id="cmInput" placeholder="تعليق..." class="input" style="flex:1" onkeydown="if(event.key==='Enter')addComment('${id}')">
        <button class="btn-primary" style="padding:5px 10px;font-size:10px" onclick="addComment('${id}')">↗</button>
      </div>
    </div>
    <div style="border-top:1px solid var(--bd);margin-top:10px;padding-top:8px;text-align:center">
      ${!t.dn?`<button class="btn-primary" style="background:var(--ok);padding:7px 18px" onclick="completeTask('${id}');closeModal()">✅ تم إنجاز المهمة</button>`:`<button class="btn-secondary" onclick="undoTask('${id}');closeModal()">↩ إعادة فتح</button>`}
    </div>`;
  openModal('تفاصيل المهمة',html);
}

function saveEditTask(id){
  tasks=tasks.map(t=>t.id===id?{...t,t:document.getElementById('tf_title').value,s:document.getElementById('tf_status').value,p:document.getElementById('tf_priority').value,as:document.getElementById('tf_assign').value,d:document.getElementById('tf_date').value}:t);
  closeModal();
  renderTasks();
}

function addComment(id){
  const inp=document.getElementById('cmInput');
  const tx=inp?.value?.trim();
  if(!tx)return;
  tasks=tasks.map(t=>t.id===id?{...t,cm:[...(t.cm||[]),{id:uid(),au:"m1",tx,tm:"الآن"}]}:t);
  openEditTask(id);
}

      <h3 style="font-size:11px;font-weight:700;margin-bottom:10px">🎨 لون الهوية</h3>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        ${colors.map(cc=>`<button class="color-btn" style="background:${cc}" onclick="changeBrand('${cc}')"></button>`).join('')}
      </div>
    </div>
    <div class="card">
      <h3 style="font-size:11px;font-weight:700;margin-bottom:10px">📌 حالات المهام</h3>
      ${STATUSES.map(s=>`<div style="display:flex;align-items:center;gap:5px;padding:6px;border-radius:6px;background:var(--bg3);margin-bottom:3px"><div style="width:10px;height:10px;border-radius:3px;background:${s.c}"></div><span style="flex:1;font-size:10px">${s.l}</span></div>`).join('')}
      <div style="display:flex;gap:4px;margin-top:6px">
        <input id="newStatusName" placeholder="حالة جديدة..." class="input" style="flex:1">
        <input id="newStatusColor" type="color" value="#6B7280" style="width:28px;height:28px;border-radius:6px;border:none;cursor:pointer">
        <button class="btn-primary" style="padding:5px 12px;font-size:10px" onclick="addStatus()">إضافة</button>
      </div>
    </div>
  </div>`;
}

function changeBrand(c){
  document.documentElement.style.setProperty('--ac',c);
}

function addStatus(){
  const name=document.getElementById('newStatusName').value;
  const color=document.getElementById('newStatusColor').value;
  if(name){
    STATUSES.push({id:uid(),l:name,c:color});
    renderSet();
  }
}
</script>
</body>
</html>
