<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>APC HR Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#F0F4F8;color:#0F172A;min-height:100vh}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:linear-gradient(135deg,#DBEAFE,#E0F2FE,#F0F4F8)}
.login-box{width:100%;max-width:360px;background:#fff;border:1px solid #CBD5E1;border-radius:20px;padding:28px;text-align:center}
.login-box img{height:50px;margin-bottom:10px}
.login-box h1{font-size:16px;font-weight:800;letter-spacing:3px;margin-bottom:2px}
.login-box p{font-size:9px;color:#94A3B8;margin-bottom:20px}
.login-box input{width:100%;padding:9px 12px;border-radius:10px;border:1px solid #CBD5E1;background:#F0F4F8;font-size:12px;outline:none;margin-bottom:10px;text-align:right}
.login-box button{width:100%;padding:11px;border-radius:10px;border:none;background:linear-gradient(135deg,#1E3A5F,#2563EB);color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.app{display:flex;min-height:100vh}
.side{width:200px;flex-shrink:0;border-left:1px solid #CBD5E1;background:#fff;height:100vh;position:sticky;top:0;display:flex;flex-direction:column;overflow:hidden}
.side .logo{padding:12px;display:flex;align-items:center;gap:6px}
.side .logo img{height:28px}
.side nav{flex:1;padding:4px 6px}
.side nav button{display:flex;align-items:center;gap:7px;padding:8px 10px;border-radius:8px;font-size:11px;border:none;cursor:pointer;width:100%;margin-bottom:2px;background:transparent;color:#475569;text-align:right;font-family:inherit}
.side nav button.active{background:#DBEAFE;color:#1E3A5F;font-weight:700}
.side .user{padding:8px;border-top:1px solid #CBD5E1}
.side .user-card{display:flex;align-items:center;gap:6px;padding:6px;border-radius:8px;background:#E8EEF4}
.side .user-card .av{width:34px;height:34px;border-radius:10px;background:#1E3A5F;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px}
.main{flex:1;display:flex;flex-direction:column}
.header{height:44px;border-bottom:1px solid #CBD5E1;display:flex;align-items:center;justify-content:space-between;padding:0 12px;position:sticky;top:0;z-index:40;background:#fff}
.header button{background:#E8EEF4;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;font-size:14px}
.content{flex:1;padding:16px;overflow-y:auto}
.card{background:#fff;border:1px solid #CBD5E1;border-radius:12px;padding:14px;margin-bottom:12px}
.card h3{font-size:12px;font-weight:700;margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:16px}
.stat{background:#fff;border:1px solid #CBD5E1;border-radius:12px;padding:12px}
.stat .num{font-size:20px;font-weight:800}
.stat .lbl{font-size:9px;color:#94A3B8}
.kanban{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px}
.kanban-col{background:#E8EEF4;border-radius:10px;padding:10px;min-height:200px}
.kanban-col .col-hdr{display:flex;align-items:center;gap:5px;margin-bottom:10px;padding-bottom:8px;font-size:11px;font-weight:700}
.task-card{background:#fff;border:1px solid #CBD5E1;border-radius:10px;padding:10px;margin-bottom:8px;cursor:pointer;border-right:3px solid #2563EB}
.task-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.06)}
.task-card h4{font-size:11px;font-weight:600;margin-bottom:4px}
.task-card .note{font-size:9px;color:#94A3B8;margin-bottom:4px}
.task-card .meta{display:flex;justify-content:space-between;align-items:center;padding-top:6px;border-top:1px solid #CBD5E150;font-size:8px;color:#94A3B8}
.badge{padding:1px 6px;border-radius:5px;font-size:8px;font-weight:600}
.btn{padding:7px 14px;border-radius:8px;border:none;font-size:11px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.btn-primary{background:#1E3A5F;color:#fff}
.btn-ok{background:#D1FAE5;color:#059669;border:1px solid #059669}
.modal-bg{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;background:rgba(0,0,0,.4)}
.modal{background:#fff;border:1px solid #CBD5E1;border-radius:16px;padding:20px;width:100%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:14px;font-weight:700;margin-bottom:14px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 10px;border-radius:8px;border:1px solid #CBD5E1;background:#F0F4F8;font-size:12px;outline:none;margin-bottom:8px;font-family:inherit}
.modal textarea{resize:vertical}
.tpl-tabs{display:flex;gap:5px;margin-bottom:14px}
.tpl-tabs button{padding:8px 14px;border-radius:10px;cursor:pointer;border:1px solid #CBD5E1;background:#fff}
.tpl-tabs button.active{border:2px solid #1E3A5F;background:#DBEAFE}
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;align-items:start}
.preview{background:#E8EEF4;border-radius:12px;overflow:hidden}
.preview-doc{background:#fff;margin:12px;border-radius:8px;padding:20px;font-family:Arial;font-size:10px;line-height:1.7;color:#111}
.preview-doc .hdr{text-align:center;border-bottom:3px solid #1E3A5F;padding-bottom:10px;margin-bottom:14px}
.preview-doc table{width:100%;border-collapse:collapse;font-size:9px;margin-bottom:12px}
.preview-doc td{padding:3px 5px;border:1px solid #D0D8E8}
.preview-doc .lbl-cell{background:#EDF2F7;font-weight:600;color:#1E3A5F;width:35%}
.preview-doc .thd{background:#1E3A5F;color:#fff;font-weight:700;text-align:center}
.res-table{width:100%;border-collapse:collapse;font-size:10px}
.res-table th{text-align:right;padding:8px 10px;color:#94A3B8;font-size:9px;font-weight:600;border-bottom:2px solid #CBD5E1}
.res-table td{padding:8px 10px;border-bottom:1px solid #CBD5E1}
.hidden{display:none}
@media(max-width:768px){
  .side{display:none}
  .kanban{grid-template-columns:1fr}
  .tpl-grid{grid-template-columns:1fr}
  .tpl-tabs{flex-wrap:wrap}
  .tpl-tabs button{flex:1;min-width:70px;padding:6px 8px}
  .tpl-tabs button div:first-child{font-size:10px}
  .res-table{display:block;overflow-x:auto}
  .content{padding:10px}
  .stats{grid-template-columns:repeat(2,1fr);gap:6px}
  .stat .num{font-size:16px}
  .card{padding:10px}
  .card h3{font-size:11px}
  .btn{padding:6px 10px;font-size:10px}
  .modal{padding:14px;margin:8px;max-width:100%}
  .modal input,.modal select,.modal textarea{font-size:14px;padding:10px}
  .preview-doc{padding:14px;margin:8px;font-size:11px}
  .preview-doc table{font-size:10px}
  .preview-doc td{padding:4px 6px}
  .header{padding:0 8px}
  .login-box{padding:20px}
  .login-box input{font-size:14px;padding:11px 12px}
  .login-box button{font-size:14px;padding:13px}
  h1{font-size:18px!important}
  input[type="text"],input[type="date"],select,textarea{font-size:14px!important}
  .mob-menu{display:block!important}
  .mob-nav{display:flex!important}
}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #CBD5E1;padding:4px 8px;z-index:50;justify-content:space-around}
.mob-nav button{flex:1;padding:8px 4px;border:none;background:transparent;cursor:pointer;font-size:9px;font-weight:600;color:#475569;border-radius:8px;font-family:inherit}
.mob-nav button.active{background:#DBEAFE;color:#1E3A5F}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
</style>
</head>

const GS_URL="https://script.google.com/macros/s/AKfycbyRfgKu158n5hbjV8kt9tCqqYsAOcpEf2G-7w1_qk6iLyEJ4N6u24LlT7K8kTX6jHIl/exec";

async function gsGet(table){
  try{const r=await fetch(GS_URL+"?action=get&table="+table);return await r.json()}
  catch(e){console.error("GS get error:",e);return null}
}
async function gsPost(body){
  try{const r=await fetch(GS_URL,{method:"POST",body:JSON.stringify(body)});return await r.json()}
  catch(e){console.error("GS post error:",e);return null}
}

async function loadFromSupabase(){
  const t=await gsGet("tasks");
  if(t&&Array.isArray(t)&&t.length>0){tasks=t.map(r=>({id:r.id,t:r.title,nt:r.notes||"",p:r.priority||"medium",as:r.assignee||"m1",d:r.due_date||"",dn:r.done===true||r.done==="true"||r.done==="TRUE",dAt:r.done_at||"",s:(r.done===true||r.done==="true")?"done":"progress"}))}
  const rs=await gsGet("resignations");
  if(rs&&Array.isArray(rs)&&rs.length>0){resignations=rs.map(r=>({id:String(r.id),eid:String(r.eid),dt:r.dt||"",reason:r.reason||"",status:r.status||"تحت الإجراء"}))}
  render();
}

async function sbFetch(table,method,body,query){

}

function downloadDoc(type){

  }

  const tplFiles={taarif:"tpl_taarif.docx",shahada:"tpl_shahada.docx",ekhla:"tpl_ekhla.docx",tathbit:"tpl_tathbit.docx"};
  const names={taarif:"تعريف_راتب",shahada:"شهادة_خدمة",ekhla:"إخلاء_طرف",tathbit:"تثبيت_راتب"};
  const e=tplEmp;

    "{{IBAN}}":e.iban||"","{{MONTH}}":e.startMonth||"","{{YEAR}}":e.startYear||""
  };
  const baseURL=window.location.href.substring(0,window.location.href.lastIndexOf("/")+1);
  const url=baseURL+tplFiles[tplTab];
  fetch(url).then(r=>r.arrayBuffer()).then(buf=>{
    let text=new TextDecoder("utf-8").decode(new Uint8Array(buf));
    // docx is a zip - we need to do binary find-replace on the XML inside
    // Since docx is binary ZIP, we use a simpler approach: manipulate as ArrayBuffer
    // Actually, let's use JSZip approach
    // Fallback: download as-is and tell user to find-replace
    // Better: use the blob directly with string replacement on the XML parts
    const blob=new Blob([buf],{type:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
    // We need JSZip to modify the docx. Let's load it dynamically
    if(!window.JSZip){
      const s=document.createElement("script");
      s.src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js";
      s.onload=()=>processDocx(buf,replacements,names[tplTab]);
      document.head.appendChild(s);
    } else {
      processDocx(buf,replacements,names[tplTab]);
    }
  }).catch(()=>{alert("تأكد من رفع ملفات القوالب (tpl_*.docx) على GitHub بجانب index.html")});
}
async function processDocx(buf,replacements,fileName){
  const zip=await JSZip.loadAsync(buf);
  const docXml=await zip.file("word/document.xml").async("string");
  let newXml=docXml;
  for(const[key,val] of Object.entries(replacements)){
    newXml=newXml.split(key).join(val);
  }
  zip.file("word/document.xml",newXml);
  const out=await zip.generateAsync({type:"blob",mimeType:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(out);
  a.download="APC_"+fileName+"_"+td+".docx";
  a.click();
}

function calculateEOS(){
  const salary=parseFloat($("eos_salary")?.value)||0;
  const housing=parseFloat($("eos_housing")?.value)||0;
  const transport=parseFloat($("eos_transport")?.value)||0;
  const other=parseFloat($("eos_other")?.value)||0;
  const startDate=$("eos_start")?.value;
  const endDate=$("eos_end")?.value;
  const reason=$("eos_reason")?.value;

  if(!salary||!startDate||!endDate){$("eosResult").innerHTML='<div style="padding:10px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;margin-top:10px;font-size:10px;color:#DC2626">أدخل الراتب الأساسي وتاريخ البداية والنهاية</div>';return}
  if(new Date(endDate)<=new Date(startDate)){$("eosResult").innerHTML='<div style="padding:10px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;margin-top:10px;font-size:10px;color:#DC2626">تاريخ النهاية يجب أن يكون بعد تاريخ البداية</div>';return}

  const totalSalary=salary+housing+transport+other;
  const start=new Date(startDate),end=new Date(endDate);

  // Precise service duration
  let sYears=end.getFullYear()-start.getFullYear();
  let sMonths=end.getMonth()-start.getMonth();
  let sDays=end.getDate()-start.getDate();
  if(sDays<0){sMonths--;sDays+=new Date(end.getFullYear(),end.getMonth(),0).getDate()}
  if(sMonths<0){sYears--;sMonths+=12}
  const exactYears=sYears+(sMonths/12)+(sDays/365.25);
  const totalDays=Math.round((end-start)/(1000*60*60*24));

  // Full EOS calculation (المادة 84)
  // First 5 years: half month per year
  // After 5 years: full month per year
  // Fractions of a year are calculated proportionally
  let fullEOS=0;
  if(exactYears<=5){
    fullEOS=(totalSalary/2)*exactYears;
  }else{
    fullEOS=(totalSalary/2)*5+totalSalary*(exactYears-5);
  }

  // Daily rate for fraction calculations
  const dailyRate=totalSalary/30;

  // Breakdown
  const first5=Math.min(exactYears,5);
  const after5=Math.max(0,exactYears-5);
  const first5Amount=(totalSalary/2)*first5;
  const after5Amount=totalSalary*after5;

  // Apply factor based on reason (المادة 85)
  let finalEOS=0,factorPct=100,factorLabel="",note="",articleRef="";
  if(reason==="article80"){
    finalEOS=0;factorPct=0;factorLabel="لا يستحق";note="إنهاء بموجب المادة 80 — لا مكافأة";articleRef="المادة 80";
  }else if(reason==="resign"){
    // Auto-detect based on years
    if(exactYears<2){
      finalEOS=0;factorPct=0;factorLabel="لا يستحق";note="استقالة قبل إتمام سنتين";articleRef="المادة 85/1";
    }else if(exactYears<5){
      finalEOS=fullEOS/3;factorPct=33.33;factorLabel="ثلث المكافأة";note="استقالة بعد سنتين وقبل 5 سنوات";articleRef="المادة 85/2";
    }else if(exactYears<10){
      finalEOS=fullEOS*2/3;factorPct=66.67;factorLabel="ثلثين المكافأة";note="استقالة بعد 5 سنوات وقبل 10";articleRef="المادة 85/3";
    }else{
      finalEOS=fullEOS;factorPct=100;factorLabel="المكافأة كاملة";note="استقالة بعد 10 سنوات أو أكثر";articleRef="المادة 85/4";
    }
  }else if(reason==="resign_woman"){
    finalEOS=fullEOS;factorPct=100;factorLabel="المكافأة كاملة";note="استقالة بسبب زواج أو إنجاب (خلال 6 أشهر)";articleRef="المادة 87";
  }else{
    finalEOS=fullEOS;factorPct=100;factorLabel="المكافأة كاملة";
    if(reason==="end_employer")note="إنهاء من قبل صاحب العمل";
    else if(reason==="contract_end")note="انتهاء مدة العقد";
    else note="قوة قاهرة";
    articleRef="المادة 84";
  }

  const fmt=n=>n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});

  $("eosResult").innerHTML='<div style="margin-top:14px"><div style="padding:20px;background:linear-gradient(135deg,#F0FDF4,#DCFCE7);border:2px solid #059669;border-radius:12px;margin-bottom:12px"><div style="text-align:center;margin-bottom:16px"><p style="font-size:10px;color:#059669;font-weight:600;margin-bottom:4px">المكافأة المستحقة</p><p style="font-size:32px;font-weight:800;color:#059669;margin:0">'+fmt(finalEOS)+'</p><p style="font-size:11px;color:#059669;margin:0">ريال سعودي</p></div>'+(factorPct<100&&factorPct>0?'<div style="text-align:center;padding:6px 12px;background:#fff;border-radius:8px;display:inline-block;width:100%"><p style="font-size:9px;color:#94A3B8;margin:0">المكافأة الكاملة قبل خصم نسبة الاستقالة</p><p style="font-size:14px;font-weight:700;color:#475569;margin:0;text-decoration:line-through">'+fmt(fullEOS)+' ريال</p></div>':'')+'</div><div class="card" style="padding:0;overflow:hidden"><table style="width:100%;border-collapse:collapse;font-size:10px"><tr style="background:#F0F4F8"><td style="padding:8px 12px;font-weight:700;color:#1E3A5F" colspan="2">تفاصيل الحساب</td></tr><tr><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;color:#94A3B8;width:40%">مدة الخدمة</td><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;font-weight:600">'+sYears+' سنة '+sMonths+' شهر '+sDays+' يوم <span style="color:#94A3B8;font-weight:400">('+totalDays.toLocaleString()+' يوم)</span></td></tr><tr style="background:#F8FAFC"><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;color:#94A3B8">الأجر الشامل</td><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;font-weight:600">'+fmt(totalSalary)+' <span style="color:#94A3B8;font-weight:400">(أساسي '+fmt(salary)+' + سكن '+fmt(housing)+' + نقل '+fmt(transport)+(other>0?' + أخرى '+fmt(other):'')+')</span></td></tr><tr><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;color:#94A3B8">أول 5 سنوات (نصف شهر/سنة)</td><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;font-weight:600">'+fmt(first5Amount)+' ريال <span style="color:#94A3B8;font-weight:400">('+first5.toFixed(2)+' سنة)</span></td></tr>'+(after5>0?'<tr style="background:#F8FAFC"><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;color:#94A3B8">بعد 5 سنوات (شهر/سنة)</td><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;font-weight:600">'+fmt(after5Amount)+' ريال <span style="color:#94A3B8;font-weight:400">('+after5.toFixed(2)+' سنة)</span></td></tr>':'')+'<tr><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;color:#94A3B8">المكافأة الكاملة</td><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;font-weight:700">'+fmt(fullEOS)+' ريال</td></tr><tr style="background:#F0FDF4"><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;color:#94A3B8">النسبة المستحقة</td><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;font-weight:700;color:'+(factorPct===100?"#059669":factorPct===0?"#DC2626":"#D97706")+'">'+factorLabel+' ('+factorPct.toFixed(2)+'%)</td></tr><tr><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;color:#94A3B8">السند النظامي</td><td style="padding:8px 12px;border-bottom:1px solid #E8EEF4;font-weight:600;color:#2563EB">'+articleRef+'</td></tr><tr style="background:#F8FAFC"><td style="padding:8px 12px;color:#94A3B8">الحالة</td><td style="padding:8px 12px;font-weight:600">'+note+'</td></tr></table></div></div>';
}

function ageCalcHTML(){
  return '<div class="card"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div style="width:36px;height:36px;border-radius:10px;background:#1E3A5F;display:flex;align-items:center;justify-content:center"><span style="color:#fff;font-size:14px;font-weight:800">#</span></div><div><h3 style="margin:0;font-size:13px">حاسبة العمر والأيام</h3><p style="font-size:9px;color:#94A3B8;margin:0">حساب دقيق بالسنوات والأشهر والأيام</p></div></div><div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">'+FLD("age_from","تاريخ الميلاد / التاريخ","date","",true)+'<div style="flex:1 1 48%;min-width:140px"><label style="font-size:9px;font-weight:600;color:#475569;display:block;margin-bottom:3px">إلى تاريخ</label><input id="age_to" type="date" value="'+td+'" style="width:100%;padding:8px 10px;border-radius:8px;border:1px solid #CBD5E1;background:#F0F4F8;font-size:12px;outline:none"></div></div><div style="display:flex;gap:6px;margin-bottom:0"><button class="btn btn-primary" style="flex:1;justify-content:center;padding:11px;font-size:13px" onclick="calculateAge()">احسب العمر</button><button class="btn" style="background:#DBEAFE;color:#1E3A5F;border:1px solid #1E3A5F;flex:1;justify-content:center;padding:11px;font-size:13px" onclick="calculateAge(true)">حساب الفرق بين تاريخين</button></div><div id="ageResult"></div></div>';
}

function calculateAge(diffMode){
  const fromStr=$("age_from")?.value;
  const toStr=$("age_to")?.value||td;
  if(!fromStr){$("ageResult").innerHTML='<div style="padding:10px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;margin-top:10px;font-size:10px;color:#DC2626">أدخل التاريخ</div>';return}

  const from=new Date(fromStr),to=new Date(toStr);
  if(to<from){$("ageResult").innerHTML='<div style="padding:10px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px;margin-top:10px;font-size:10px;color:#DC2626">التاريخ الثاني يجب أن يكون بعد الأول</div>';return}

  const totalDays=Math.floor((to-from)/(1000*60*60*24));
  const totalWeeks=Math.floor(totalDays/7);
  const totalHours=totalDays*24;

  // Precise calculation
  let years=to.getFullYear()-from.getFullYear();
  let months=to.getMonth()-from.getMonth();
  let days=to.getDate()-from.getDate();
  if(days<0){months--;days+=new Date(to.getFullYear(),to.getMonth(),0).getDate()}
  if(months<0){years--;months+=12}
  const totalMonths=years*12+months;

  // Retirement (60 years)
  const retireDate=new Date(from.getFullYear()+60,from.getMonth(),from.getDate());
  const daysToRetire=Math.floor((retireDate-to)/(1000*60*60*24));
  const retireYears=Math.floor(daysToRetire/365.25);
  const retireMonths=Math.floor((daysToRetire%365.25)/30.44);

  // Next birthday
  let nextBday=new Date(to.getFullYear(),from.getMonth(),from.getDate());
  if(nextBday<=to)nextBday=new Date(to.getFullYear()+1,from.getMonth(),from.getDate());
  const daysToNextBday=Math.floor((nextBday-to)/(1000*60*60*24));

  const title=diffMode?"الفرق بين التاريخين":"العمر";
  const mainColor=diffMode?"#2563EB":"#1E3A5F";

  $("ageResult").innerHTML='<div style="margin-top:14px"><div style="padding:20px;background:linear-gradient(135deg,#EFF6FF,#DBEAFE);border:2px solid '+mainColor+';border-radius:12px;margin-bottom:12px"><div style="text-align:center;margin-bottom:14px"><p style="font-size:10px;color:'+mainColor+';font-weight:600;margin-bottom:4px">'+title+'</p><p style="font-size:28px;font-weight:800;color:'+mainColor+';margin:0">'+years+' <span style="font-size:13px">سنة</span> '+months+' <span style="font-size:13px">شهر</span> '+days+' <span style="font-size:13px">يوم</span></p></div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px"><div style="text-align:center;padding:8px;background:#fff;border-radius:8px"><p style="font-size:14px;font-weight:800;color:#DC2626;margin:0">'+totalDays.toLocaleString()+'</p><p style="font-size:8px;color:#94A3B8;margin:0">يوم</p></div><div style="text-align:center;padding:8px;background:#fff;border-radius:8px"><p style="font-size:14px;font-weight:800;color:#D97706;margin:0">'+totalWeeks.toLocaleString()+'</p><p style="font-size:8px;color:#94A3B8;margin:0">أسبوع</p></div><div style="text-align:center;padding:8px;background:#fff;border-radius:8px"><p style="font-size:14px;font-weight:800;color:#059669;margin:0">'+totalMonths.toLocaleString()+'</p><p style="font-size:8px;color:#94A3B8;margin:0">شهر</p></div><div style="text-align:center;padding:8px;background:#fff;border-radius:8px"><p style="font-size:14px;font-weight:800;color:#2563EB;margin:0">'+totalHours.toLocaleString()+'</p><p style="font-size:8px;color:#94A3B8;margin:0">ساعة</p></div></div></div>'+(!diffMode?'<div style="display:flex;flex-direction:column;gap:6px">'+(daysToRetire>0?'<div style="padding:10px 14px;background:#F0FDF4;border:1px solid #BBF7D0;border-radius:8px;display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:#059669"></div><p style="font-size:10px;color:#059669;margin:0">باقي على سن التقاعد (60 سنة): <b>'+retireYears+' سنة '+retireMonths+' شهر</b></p></div>':'<div style="padding:10px 14px;background:#FEF2F2;border:1px solid #FECACA;border-radius:8px"><p style="font-size:10px;color:#DC2626;margin:0;font-weight:600">تجاوز سن التقاعد (60 سنة) بـ '+Math.abs(Math.floor(daysToRetire/365))+' سنة</p></div>')+'<div style="padding:10px 14px;background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;display:flex;align-items:center;gap:8px"><div style="width:8px;height:8px;border-radius:50%;background:#D97706"></div><p style="font-size:10px;color:#92400E;margin:0">عيد الميلاد القادم بعد: <b>'+daysToNextBday+' يوم</b></p></div></div>':'')+'</div>';
}

  return '<h1 style="font-size:20px;font-weight:800;margin-bottom:14px">الإعدادات</h1><div class="card"><h3>حالات المهام</h3><div style="display:flex;align-items:center;gap:5px;padding:6px;border-radius:6px;background:#E8EEF4;margin-bottom:4px"><div style="width:10px;height:10px;border-radius:3px;background:#2563EB"></div><span style="font-size:10px">تنفيذ</span></div><div style="display:flex;align-items:center;gap:5px;padding:6px;border-radius:6px;background:#E8EEF4"><div style="width:10px;height:10px;border-radius:3px;background:#10B981"></div><span style="font-size:10px">منجزة</span></div></div><div class="card"><h3>مزامنة البيانات</h3><p style="font-size:10px;color:#475569;margin-bottom:8px">رفع بيانات الاستقالات الحالية إلى Google Sheets (مرة واحدة فقط)</p><button class="btn btn-primary" onclick="uploadAllRes()" id="syncBtn">رفع الاستقالات إلى Google Sheets</button><span id="syncStatus" style="font-size:10px;color:#059669;margin-right:8px"></span></div><div class="card"><h3>رابط الشيت</h3><p style="font-size:10px;color:#475569;margin-bottom:8px">افتح Google Sheets مباشرة لعرض أو تعديل البيانات</p><a href="https://docs.google.com/spreadsheets/d/1nafhCl6ZzXpldIyIJoTVcadwPxqyhRZRKVgeDsWE_QE/edit" target="_blank" class="btn btn-ok" style="display:inline-block;text-decoration:none">فتح Google Sheets</a></div><div class="card"><h3>معلومات النظام</h3><p style="font-size:10px;color:#475569">الشركة العربية للأنابيب — APC HR Portal v3.0</p><p style="font-size:10px;color:#94A3B8;margin-top:4px">متصل بـ Google Sheets — البيانات محفوظة تلقائياً</p></div>';
}
async function uploadAllRes(){
  const btn=document.getElementById("syncBtn");const st=document.getElementById("syncStatus");
  btn.disabled=true;btn.textContent="جاري الرفع...";
  const rows=resignations.map(r=>({id:r.id,eid:r.eid,dt:r.dt,reason:r.reason,status:r.status}));
  const res=await gsPost({action:"bulk_add",table:"resignations",rows:rows});
  if(res&&res.success){st.textContent="تم رفع "+res.count+" سجل بنجاح";btn.textContent="تم الرفع"}
  else{st.textContent="فشل الرفع - تحقق من الرابط";st.style.color="#DC2626";btn.disabled=false;btn.textContent="إعادة المحاولة"}
}
